lifecycle_regression = [
    "lifecycle/wm_chick_brood_01.jpg",
    "lifecycle/wm_chick_hatchling_01.jpg",
    "lifecycle/wm_chick_hatchling_egg_01.jpg",
    "lifecycle/wm_chick_multiple_01.jpg",
    "lifecycle/wm_chick_week_old_01.jpg",
    "lifecycle/wm_chicks_begging_02.jpg",
    "lifecycle/wm_chicks_with_mom_01.jpg",
    "lifecycle/wm_incubating_01.jpg",
    "lifecycle/wm_incubating_02.jpg",
    "lifecycle/wm_incubating_03.jpg",
